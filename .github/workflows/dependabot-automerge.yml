name: Dependabot automerge

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Merge Dependabot PRs after CI passes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          REPOSITORY: ${{ github.repository }}
          APPROVER_LOGIN: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          prs="$(gh api "repos/${REPOSITORY}/commits/${HEAD_SHA}/pulls" \
            -H "Accept: application/vnd.github+json" \
            --jq '.[] | select(.user.login == "dependabot[bot]" and .state == "open") | .number')"

          if [ -z "$prs" ]; then
            echo "No open Dependabot PRs found for ${HEAD_SHA}."
            exit 0
          fi

          for pr in $prs; do
            reviews="$(gh api "repos/${REPOSITORY}/pulls/${pr}/reviews" -H "Accept: application/vnd.github+json")"
            approval="$(jq -r --arg approver "$APPROVER_LOGIN" '
              map(select(.user.login == $approver))
              | sort_by(.submitted_at)
              | last
              | select(.state == "APPROVED")
              | .state // empty
            ' <<<"$reviews")"

            if [ -z "$approval" ]; then
              echo "Skipping PR #$pr: waiting for approval from ${APPROVER_LOGIN}."
              continue
            fi

            gh pr merge "$pr" --repo "$REPOSITORY" --squash --delete-branch
          done
